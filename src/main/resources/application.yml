spring:
  application:
    name: notification-api
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/notifications}
    username: ${SPRING_DATASOURCE_USERNAME:notifications}
    password: ${SPRING_DATASOURCE_PASSWORD:notifications}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc.time_zone: UTC
        format_sql: true
        default_schema: notification
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    schemas: notification
    default-schema: notification
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: notification-api
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

kafka:
  enabled: ${KAFKA_ENABLED:true}

auth:
  service:
    url: ${AUTH_SERVICE_URL:http://localhost:8080}

internal:
  api:
    key: ${INTERNAL_API_KEY:dev-secret-key}

server:
  port: ${PORT:8080}

logging:
  level:
    com.example.notification: DEBUG
