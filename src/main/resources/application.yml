spring:
  application:
    name: notification-api
  datasource:
    url: jdbc:postgresql://localhost:5432/notifications
    username: notifications
    password: notifications
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc.time_zone: UTC
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true

server:
  port: 8080

logging:
  level:
    com.example.notification: DEBUG
